<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstall | Digital Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-bar">
        <div class="logo">Bookstall</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for Class 11, JEE, Physics...">
        </div>
        <div class="actions">
            <a href="upload.html" class="upload-btn">+ Upload</a>
        </div>
    </header>

    <main class="container">
        <div class="grid-header">
            <h2>All Books <span class="count">172 results</span></h2>
        </div>

        <div class="book-grid" id="bookGrid">
            
            <div class="book-card">
                <div class="cover-wrapper">
                    <img src="https://ncert.nic.in/textbook/pdf/keph101.jpg" alt="Physics Class 11">
                </div>
                <div class="book-info">
                    <h3>Physics Class 11 - Part 1</h3>
                    <p>NCERT | 2026 Edition</p>
                    <span class="badge">Class 11</span>
                </div>
            </div>

            <div class="book-card">
                <div class="cover-wrapper">
                    <img src="https://m.media-amazon.com/images/I/8173-9xL7vL.jpg" alt="JEE Mathematics">
                </div>
                <div class="book-info">
                    <h3>Cengage Maths - Algebra</h3>
                    <p>G. Tewani | JEE Advanced</p>
                    <span class="badge exam">JEE</span>
                </div>
            </div>

            </div>
    </main>

</body>
</html>
