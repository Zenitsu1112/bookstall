<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload to Bookstall</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">Bookstall</a></div>
    </header>

    <div class="container" style="max-width: 600px; margin: 0 auto;">
        <h1>Contribute a Book</h1>
        <p style="color: var(--text-dim);">All uploads are manually reviewed by our team before going live.</p>

        <form action="https://yourname.infinityfreeapp.com/submit.php" method="POST" class="upload-form">
            <div class="form-group">
                <label>Book Title</label>
                <input type="text" name="title" placeholder="e.g. NCERT Physics Class 11 Part 1" required>
            </div>

            <div class="form-group">
                <label>Grade / Exam</label>
                <select name="grade">
                    <option value="Class 11">Class 11</option>
                    <option value="Class 12">Class 12</option>
                    <option value="JEE">JEE Main/Adv</option>
                    <option value="NEET">NEET</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Book Cover URL</label>
                <input type="url" name="cover_url" placeholder="Link to an image of the cover" required>
            </div>

            <div class="form-group">
                <label>PDF Download Link</label>
                <input type="url" name="file_url" placeholder="Google Drive or Mega Link" required>
            </div>

            <button type="submit" class="upload-btn" style="width:100%; border:none; cursor:pointer; margin-top:20px;">Submit for Review</button>
        </form>
    </div>
</body>
</html>
