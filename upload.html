<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload to Bookstall | Digital Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .upload-container { max-width: 600px; margin: 50px auto; padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid #334155; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--accent); }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .file-info { font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #334155; border: none; color: white; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: var(--accent); color: #0f172a; }
        #linkInput { display: none; } /* Hidden by default */
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">Bookstall</a></div>
    </header>

    <div class="upload-container">
        <h1>Add to Bookstall</h1>
        <p style="color: var(--text-dim); margin-bottom: 20px;">Manual review active. Books appear after approval.</p>

        <div class="tab-buttons">
            <button type="button" class="tab-btn active" onclick="showMethod('file')">Internal Storage</button>
            <button type="button" class="tab-btn" onclick="showMethod('link')">Cloud Link (Drive/Mega)</button>
        </div>

        <form action="https://bookstall.infinityfreeapp.com/upload_process.php" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Book Title</label>
                <input type="text" name="title" placeholder="e.g. NCERT Physics Class 11 Part 1" required>
            </div>

            <div class="form-group">
                <label>Grade / Category</label>
                <select name="grade">
                    <option value="Class 11">Class 11</option>
                    <option value="Class 12">Class 12</option>
                    <option value="JEE">JEE Main/Adv</option>
                    <option value="NEET">NEET</option>
                    <option value="UPSC">UPSC</option>
                    <option value="Fairy Tale">Fairy Tale</option>
                </select>
            </div>

            <div class="form-group" id="fileInput">
                <label>Select PDF from Device</label>
                <input type="file" name="book_file" accept=".pdf,.epub">
                <p class="file-info">Max size: 10MB (Recommended for NCERT chapters)</p>
            </div>

            <div class="form-group" id="linkInput">
                <label>Paste Cloud Link</label>
                <input type="url" name="file_url" placeholder="https://drive.google.com/...">
                <p class="file-info">Use this for large books (>10MB)</p>
            </div>

            <div class="form-group">
                <label>Cover Image URL</label>
                <input type="url" name="cover_url" placeholder="Link to book cover image" required>
            </div>

            <button type="submit" class="upload-btn" style="width:100%; border:none; cursor:pointer;">Submit for Review</button>
        </form>
    </div>

    <script>
        function showMethod(method) {
            const fileInp = document.getElementById('fileInput');
            const linkInp = document.getElementById('linkInput');
            const btns = document.querySelectorAll('.tab-btn');

            if (method === 'file') {
                fileInp.style.display = 'block';
                linkInp.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                fileInp.style.display = 'none';
                linkInp.style.display = 'block';
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
            }
        }
    </script>
</body>
</html>
